<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Hub local do Holyrics Voice Assistant"
    />
    <title>Holyrics Voice Assistant</title>
    <link rel="stylesheet" href="/css/base.css" />
    <script src="/js/base.js" defer></script>
  </head>
  <body>
    <main class="page-shell">
      <header class="hero">
        <p class="eyebrow">Controle local</p>
        <h1>Holyrics Voice Assistant</h1>
        <p class="hero__description">
          Escolha a área que deseja acessar neste dispositivo.
        </p>
      </header>

      <nav class="hub-grid" aria-label="Áreas principais">
        <a class="area-card" href="/preacher">
          <span class="area-card__icon" aria-hidden="true">📖</span>
          <span class="area-card__content">
            <strong>Pregador</strong>
            <span>Acesse o painel dedicado à pregação.</span>
          </span>
          <span class="area-card__arrow" aria-hidden="true">→</span>
        </a>

        <a class="area-card" href="/worship">
          <span class="area-card__icon" aria-hidden="true">♫</span>
          <span class="area-card__content">
            <strong>Louvor</strong>
            <span>Acesse o painel da equipe de louvor.</span>
          </span>
          <span class="area-card__arrow" aria-hidden="true">→</span>
        </a>

        <a class="area-card" href="/settings">
          <span class="area-card__icon" aria-hidden="true">⚙</span>
          <span class="area-card__content">
            <strong>Configurações</strong>
            <span>Prepare os serviços locais do sistema.</span>
          </span>
          <span class="area-card__arrow" aria-hidden="true">→</span>
        </a>
      </nav>
    </main>

    <footer class="site-footer">
      <span>Aplicação local e offline-first</span>
      <span aria-hidden="true">•</span>
      <span data-current-year></span>
    </footer>
  </body>
</html>
